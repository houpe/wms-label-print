# =====================================================================
# wms-label Nginx 配置  ——  修复 ChunkLoadError / 404 的关键
# =====================================================================
# 部署位置（服务器 root@www.houpe.top）：
#   1. 把本文件放到：  /etc/nginx/conf.d/wms-label.conf
#                      (或 include 进已有的 server 块；按需调整)
#   2. 测试：         sudo nginx -t
#   3. 生效：         sudo nginx -s reload
# =====================================================================
#
# 核心原理：
#   - 带 hash 文件名的静态资源（/_next/static/）内容永远不会变（变了名字就变），
#     所以可以 immutable 长期缓存（1 年），浏览器永远不会再请求旧文件。
#   - HTML 页面引用着具体的 chunk hash，所以 HTML 必须每次都拿最新版，
#     否则会引用到已被新构建删除的旧 chunk → 404 → ChunkLoadError。
#   - 因此：HTML no-cache，静态资源 immutable。
# =====================================================================

# Next.js 应用监听在 3008（见 ecosystem.config.cjs 的 PORT）
upstream wms_label_backend {
    server 127.0.0.1:3008;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name houpe.top www.houpe.top;

    # （可选）http -> https 跳转；如已有顶层统一跳转可删掉这个 server 块
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name houpe.top www.houpe.top;

    # ↓↓↓ 把你自己的 SSL 证书路径填到这里 ↓↓↓
    # ssl_certificate     /etc/letsencrypt/live/houpe.top/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/houpe.top/privkey.pem;

    # ------- 1) 静态资源：带 hash，可长期 immutable 缓存 -------
    location /print/_next/static/ {
        proxy_pass http://wms_label_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # 内容随文件名 hash 变，所以可以永久缓存
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ------- 2) HMR / websocket（生产一般用不到，留作兼容） -------
    location /print/_next/webpack-hmr {
        proxy_pass http://wms_label_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ------- 3) HTML / 页面：绝不缓存，保证拿到最新 chunk 引用 -------
    location /print/ {
        proxy_pass http://wms_label_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 页面 HTML 永不缓存（关键！）
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # 上传/导出 Excel 等场景可允许稍长响应
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ------- 4) API（如有别的路径需要走 Next，也按上面 proxy) -------
}
